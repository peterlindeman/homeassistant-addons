name: "Signal API Receiver"
version: "1.0.3"
slug: "signal_api_receiver"
description: "Polls a signal-cli-rest-api json-rpc websocket and exposes received messages over a simple HTTP endpoint"
url: "https://github.com/peterlindeman/homeassistant-addons/tree/main/signal-api-receiver"
arch:
  - amd64
  - aarch64
init: false
startup: services
boot: auto
ports:
  8105/tcp: 8105
ports_description:
  8105/tcp: "HTTP endpoint (e.g. GET /receive/pop)"
options:
  signal_account: ""
  signal_api_url: "ws://192.168.1.2:8080"
  log_level: "info"
  server_addr: ":8105"
  repeat_last_message: false
  record_message_type: "data-message"
  mqtt_server: ""
  mqtt_client_id: ""
  mqtt_user: ""
  mqtt_password: ""
  mqtt_topic_prefix: "signal-api-receiver"
  mqtt_qos: 1
  mqtt_retain: false
  mqtt_insecure_skip_verify: false
schema:
  signal_account: "match(^\\+[0-9]+$)"
  signal_api_url: "match(^wss?://.+)"
  log_level: "list(trace|debug|info|warn|error|fatal|panic)?"
  server_addr: "str?"
  repeat_last_message: "bool?"
  record_message_type: "list(receipt|typing|data|data-message|sync)?"
  mqtt_server: "str?"
  mqtt_client_id: "str?"
  mqtt_user: "str?"
  mqtt_password: "password?"
  mqtt_topic_prefix: "str?"
  mqtt_qos: "int(0,2)?"
  mqtt_retain: "bool?"
  mqtt_insecure_skip_verify: "bool?"
